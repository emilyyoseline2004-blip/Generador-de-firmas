<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Firmas - El Economista</title>

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2f7, #f8fafc);
    margin:0;
    padding:40px;
}

.container{
    max-width:1000px;
    margin:auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.card{
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

h2{
    margin-bottom:20px;
    color:#1f2937;
}

label{
    font-weight:600;
    display:block;
    margin-top:10px;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #d1d5db;
}

button{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.btn-generar{
    background:#2563eb;
    color:white;
}

.btn-copiar{
    background:#111827;
    color:white;
}

.preview{
    background:#f9fafb;
    padding:15px;
    border-radius:10px;
    min-height:300px;
}

textarea{
    width:100%;
    margin-top:15px;
    border-radius:10px;
    padding:10px;
    min-height:150px;
}

.success{
    color:green;
    text-align:center;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- FORMULARIO -->
<div class="card">
<h2>✨ Generador de Firmas</h2>

<label>Correo</label>
<input type="email" id="correo" oninput="generarFirma()">

<label>Extensión</label>
<input type="text" id="extension" oninput="generarFirma()">

<label>Móvil</label>
<input type="text" id="movil" oninput="generarFirma()">

<label>ID Imagen</label>
<input type="text" id="imagen" oninput="generarFirma()">

<button class="btn-generar" onclick="generarFirma()">Generar Firma</button>
<button class="btn-copiar" onclick="copiarFirma()">Copiar Firma</button>

<div id="mensaje" class="success"></div>

<textarea id="resultado"></textarea>
</div>

<!-- PREVIEW -->
<div class="card">
<h2>👁 Vista previa</h2>
<div id="preview" class="preview"></div>
</div>

</div>

<script>
function generarFirma(){

let correo = document.getElementById("correo").value;
let extension = document.getElementById("extension").value;
let imagen = document.getElementById("imagen").value;
let movil = document.getElementById("movil").value;

let extTexto = extension ? "Ext. " + extension : "";
let movilTexto = movil ? "<br>Móvil " + movil : "";

let firma = `
<table style="font-family:Arial;font-size:14px;">
<tr><td>
<img src="https://media.eleconomista.com.mx/contenido/img/logo.png" width="200"><br><br>
<img src="https://media.eleconomista.com.mx/contenido/img/${imagen}.png" width="300"><br><br>

<span style="color:#006595;">${correo}</span><br>
<span style="color:#006595;">Conmutador 55-5326-5454 ${extTexto}</span>
${movilTexto}
</td></tr>
</table>
`;

document.getElementById("resultado").value = firma;
document.getElementById("preview").innerHTML = firma;
}

function copiarFirma(){
let texto = document.getElementById("resultado");
texto.select();
document.execCommand("copy");

document.getElementById("mensaje").innerText = "✅ Firma copiada";
}
</script>

</body>
</html>
</html>
